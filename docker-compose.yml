services:
  # ── Frontend (Next.js) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    depends_on:
      - backend
    networks:
      - mafia_net
    restart: unless-stopped

  # ── Backend (Node.js + Socket.IO) ───────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_URL=redis://host.docker.internal:6379
      - DATABASE_URL=postgresql://mafia_user:mafia_pass@postgres:5432/mafia_db
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mafia_net
    restart: unless-stopped

  # ── PostgreSQL (Persistent DB) ──────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=mafia_user
      - POSTGRES_PASSWORD=mafia_pass
      - POSTGRES_DB=mafia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mafia_user -d mafia_db"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mafia_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  mafia_net:
    driver: bridge
