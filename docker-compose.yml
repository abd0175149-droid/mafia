services:
  # ── Frontend (Next.js) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend (Node.js + Socket.IO) ───────────────
  # network_mode: host → يشارك شبكة السيرفر مباشرة
  # فيقدر يوصل Redis على localhost:6379
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_URL=redis://127.0.0.1:6379
      - DATABASE_URL=postgresql://mafia_user:mafia_pass@127.0.0.1:5432/mafia_db
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL (Persistent DB) ──────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=mafia_user
      - POSTGRES_PASSWORD=mafia_pass
      - POSTGRES_DB=mafia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mafia_user -d mafia_db"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
